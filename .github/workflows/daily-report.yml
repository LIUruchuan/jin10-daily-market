name: 📰 金十数据日报

on:
  schedule:
    # 每天 08:00 北京时间 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      skip_notify:
        description: '跳过 Server酱 通知'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Jin10 events
        run: python scripts/fetch_jin10.py

      - name: Fetch market data
        run: python scripts/fetch_market.py

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          if git diff --staged --quiet; then
            echo "No new data, skip commit."
          else
            git commit -m "📰 Daily update: $(date +'%Y-%m-%d') market report"
            git pull --rebase --autostash
            git push
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Server酱通知
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_notify != 'true' }}
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python3 scripts/send_notify.py "金十日报" "data/history/summary.json"

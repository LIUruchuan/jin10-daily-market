name: 📰 金十数据日报

on:
  schedule:
    # 每天 08:00 北京时间 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      skip_notify:
        description: '跳过 Server酱 通知'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Jin10 events
        run: python scripts/fetch_jin10.py

      - name: Fetch market data
        run: python scripts/fetch_market.py

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          if git diff --staged --quiet; then
            echo "No new data, skip commit."
          else
            git commit -m "📰 Daily update: $(date +'%Y-%m-%d') market report"
            git pull --rebase --autostash
            git push
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Server酱通知
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_notify != 'true' }}
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          if [ -z "$SERVERCHAN_SENDKEY" ]; then
            echo "No SERVERCHAN_SENDKEY, skip notify."
            exit 0
          fi

          DATE=$(date +'%Y-%m-%d')
          PAGE_URL="https://liuruchuan.github.io/jin10-daily-market/"

          SUMMARY_FILE="data/summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            eval $(python3 -c "
import json
with open('$SUMMARY_FILE') as f:
    d = json.load(f)
print(f'TOTAL={d.get(\"total_events\", 0)}')
print(f'IMP={d.get(\"important_events\", 0)}')
top3 = d.get('top_sectors', [])
print(f'SECT_1={top3[0] if len(top3)>0 else \"\"}')
print(f'SECT_2={top3[1] if len(top3)>1 else \"\"}')
print(f'SECT_3={top3[2] if len(top3)>2 else \"\"}')
idx = d.get('indices', [{}])[0]
print(f'IDX_NAME={idx.get(\"name\",\"\")}')
print(f'IDX_CLOSE={idx.get(\"close\",0):.0f}')
print(f'IDX_PCT={idx.get(\"pct_change\",0):+.2f}')
")

            desp="<h3>金十数据日报</h3>"
            desp="$desp<p><b>日期</b>: ${DATE} | <b>事件</b>: ${TOTAL}条 (重要:${IMP}条)</p>"
            if [ -n "$SECT_1" ]; then
              desp="$desp<p><b>事件热点</b>: ${SECT_1}${SECT_2:+, $SECT_2}${SECT_3:+, $SECT_3}</p>"
            fi
            if [ -n "${IDX_NAME}" ]; then
              color="#e74c3c"; if [ "${IDX_PCT:0:1}" = "-" ]; then color="#27ae60"; fi
              desp="$desp<p><b>${IDX_NAME}</b>: <span style='color:${color};font-weight:bold;'>${IDX_CLOSE} (${IDX_PCT}%)</span></p>"
            fi
            desp="$desp<br/><a href='${PAGE_URL}'>查看完整报告 &rarr;</a>"
          else
            desp="<h3>金十数据日报</h3><p>${DATE}</p><br/><a href='${PAGE_URL}'>查看完整报告 &rarr;</a>"
          fi

          desp="$desp<hr/><p style='color:#999;font-size:12px;'>每日 08:00 自动推送</p>"

          curl -s -X POST "https://sctapi.ftqq.com/$SERVERCHAN_SENDKEY.send" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"金十日报 (${DATE})\",\"desp\":\"${desp}\"}"
          echo "Server酱 通知已发送"
